<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Crochet Feature Graphic</title>
    <style>
      body {
        margin: 0;
        width: 1024px;
        height: 500px;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 154, 158, 0.8), transparent 26%),
          radial-gradient(circle at 82% 24%, rgba(139, 92, 246, 0.35), transparent 28%),
          linear-gradient(135deg, #fff5eb 0%, #f4e1ff 52%, #dff0ff 100%);
        color: #1e1b4b;
      }

      .shell {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 360px 1fr;
        align-items: center;
        gap: 24px;
        padding: 36px 44px;
        box-sizing: border-box;
      }

      .logo-card {
        height: 100%;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 24px 50px rgba(78, 52, 123, 0.16);
      }

      .logo-card img {
        width: 270px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 64px;
        line-height: 0.95;
      }

      p {
        margin: 0 0 20px;
        font-size: 24px;
        line-height: 1.35;
        color: #334155;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .chip {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 24px rgba(78, 52, 123, 0.12);
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="logo-card">
        <img src="../assets/fast-crochet-logo.png" alt="Fast Crochet" />
      </div>
      <section>
        <h1>Fast<br />Crochet</h1>
        <p>Transforme imagens em diagramas e receitas de crochet com camera, IA e fluxo pronto para producao.</p>
        <div class="chips">
          <span class="chip">Camera</span>
          <span class="chip">4 estilos</span>
          <span class="chip">Diagramas</span>
          <span class="chip">Receitas</span>
        </div>
      </section>
    </div>
  </body>
</html>
